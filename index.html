<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px;
      line-height: 1.6;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 12px;
    }
    button {
      margin-top: 24px;
      cursor: pointer;
    }
    .msg {
      margin-top: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>予約フォーム</h1>
  <h1>予約フォーム v3</h1>
  <p style="color:red;">2026-03-20 20:20 更新版</p>

  <label for="date">日付</label>
  <input type="date" id="date" />

  <label for="time">時間</label>
  <select id="time">
    <option value="">選択してください</option>
    <option value="10:00">10:00</option>
    <option value="11:00">11:00</option>
    <option value="13:00">13:00</option>
    <option value="14:00">14:00</option>
  </select>

  <label for="note">備考</label>
  <textarea id="note" rows="4" placeholder="任意で入力してください"></textarea>

  <button id="submitBtn">予約する</button>

  <div class="msg" id="msg"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
<script>
  const LIFF_ID = '2009547355-6bGGAu4O';
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqi98cQ9NATiWmSq6nO_f1Sx3Zv5VwshnB5wIvMTeYxkPp7pw3_IjRG4_vskSfoEtN/exec';

  async function initLiff() {
    alert('version: 2026-03-20-2020');
    try {
      await liff.init({ liffId: LIFF_ID });
      document.getElementById('msg').textContent = 'LIFFの初期化が完了しました。';
    } catch (e) {
      alert('init error: ' + e.message);
    }
  }

  async function submitReservation() {
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const note = document.getElementById('note').value;

    if (!date || !time) {
      alert('日付と時間を選択してください。');
      return;
    }

    try {
      let lineUserId = '';
      let displayName = '';

      try {
        const profile = await liff.getProfile();
        lineUserId = profile.userId || '';
        displayName = profile.displayName || '';
      } catch (profileErr) {
        console.log('profile取得失敗:', profileErr);
      }

      const body = new URLSearchParams({
        lineUserId,
        displayName,
        date,
        time,
        note
      });

      const res = await fetch(GAS_URL, {
        method: 'POST',
        body
      });

      const text = await res.text();
      alert('response=' + text);

      let json;
      try {
        json = JSON.parse(text);
      } catch (e) {
        throw new Error('JSON解析失敗: ' + text);
      }

      if (json.ok) {
        alert('予約を受け付けました。');
        if (liff.isInClient()) {
          liff.closeWindow();
        }
      } else {
        throw new Error(json.error || '送信に失敗しました');
      }

    } catch (e) {
      alert('送信エラー: ' + e.message);
    }
  }

  document.getElementById('submitBtn').addEventListener('click', submitReservation);
  initLiff();
</script>
</body>
</html>
