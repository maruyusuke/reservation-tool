<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約フォーム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1>予約フォーム 2</h1>

  <div id="userInfo" style="margin-bottom: 16px;"></div>

  <form id="reserveForm">
    <div>
      <label for="date">日付</label>
      <input type="date" id="date" name="date" required>
    </div>

    <div>
      <label for="time">時間</label>
      <select id="time" name="time" required>
        <option value="">選択してください</option>
        <option value="10:00">10:00</option>
        <option value="11:00">11:00</option>
        <option value="13:00">13:00</option>
        <option value="14:00">14:00</option>
      </select>
    </div>

    <div>
      <label for="note">備考</label>
      <textarea id="note" name="note"></textarea>
    </div>

    <button type="submit">予約する</button>
  </form>

  <div id="message" style="margin-top: 16px;"></div>

  <script>
    const LIFF_ID = '2009547355-6bGGAu4O';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqi98cQ9NATiWmSq6nO_f1Sx3Zv5VwshnB5wIvMTeYxkPp7pw3_IjRG4_vskSfoEtN/exec';

    let profile = null;

    async function initializeLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });

        // LINE内ブラウザ以外も考慮してログイン
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        profile = await liff.getProfile();

        document.getElementById('userInfo').innerHTML = `
          <p>LINEユーザー: ${escapeHtml(profile.displayName)}</p>
        `;
      } catch (error) {
        console.error('LIFF初期化エラー:', error);
        document.getElementById('message').textContent =
          'LIFFの初期化に失敗しました。';
      }
    }

    document.getElementById('reserveForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      const note = document.getElementById('note').value;

      if (!profile) {
        document.getElementById('message').textContent =
          'LINEユーザー情報の取得に失敗しています。';
        return;
      }

      try {
        const body = new URLSearchParams({
          lineUserId: profile.userId,
          displayName: profile.displayName,
          date,
          time,
          note
        });

        const response = await fetch(GAS_URL, {
          method: 'POST',
          body
        });

        const result = await response.json();

        if (result.ok) {
          document.getElementById('message').textContent =
            '予約が完了しました。';
        } else {
          document.getElementById('message').textContent =
            result.message || '予約に失敗しました。';
        }
      } catch (error) {
        console.error('送信エラー:', error);
        document.getElementById('message').textContent =
          '送信中にエラーが発生しました。';
      }
    });

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    initializeLiff();
  </script>
</body>
</html>
