<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px;
      line-height: 1.6;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 12px;
    }
    button {
      margin-top: 24px;
      cursor: pointer;
    }
    .msg {
      margin-top: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>予約フォーム</h1>

  <label for="date">日付</label>
  <input type="date" id="date" />

  <label for="time">時間</label>
  <select id="time">
    <option value="">選択してください</option>
    <option value="10:00">10:00</option>
    <option value="11:00">11:00</option>
    <option value="13:00">13:00</option>
    <option value="14:00">14:00</option>
  </select>

  <label for="note">備考</label>
  <textarea id="note" rows="4" placeholder="任意で入力してください"></textarea>

  <button id="submitBtn">予約する</button>

  <div class="msg" id="msg"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = '2009547355-6bGGAu4O';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqi98cQ9NATiWmSq6nO_f1Sx3Zv5VwshnB5wIvMTeYxkPp7pw3_IjRG4_vskSfoEtN/exec';

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        document.getElementById('msg').textContent = 'LIFFの初期化が完了しました。';
      } catch (e) {
        document.getElementById('msg').textContent = 'LIFF初期化エラー: ' + e.message;
      }
    }

    async function submitReservation() {
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      const note = document.getElementById('note').value;

      if (!date || !time) {
        alert('日付と時間を選択してください。');
        return;
      }

      try {
        const profile = await liff.getProfile();

        const payload = {
          lineUserId: profile.userId,
          displayName: profile.displayName,
          date,
          time,
          note
        };

        if (GAS_URL.includes('ここに後で')) {
          alert('まずは画面表示確認段階です。次にGAS URLを設定します。\\n\\n' + JSON.stringify(payload, null, 2));
          return;
        }

        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const json = await res.json();

        if (json.ok) {
          alert('予約を受け付けました。');
          if (liff.isInClient()) {
            liff.closeWindow();
          }
        } else {
          alert('送信に失敗しました。');
        }
      } catch (e) {
        alert('エラー: ' + e.message);
      }
    }

    document.getElementById('submitBtn').addEventListener('click', submitReservation);

    initLiff();
  </script>
</body>
</html>
